version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/geekgonecrazy/capsule/models
plugins:
  - local: protoc-gen-go
    out: models
    opt:
      - paths=source_relative
  - local: protoc-gen-go-grpc
    out: models
    opt:
      - paths=source_relative
inputs:
  - directory: models
