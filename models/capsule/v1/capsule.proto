syntax = "proto3";

package capsule.v1;

// CapsuleService exposes operations that describe or control the capsule
// (the running capsule instance on a single machine) as a whole.
service CapsuleService {
  // GetInfo returns identity and runtime information about this capsule.
  rpc GetInfo(GetInfoRequest) returns (GetInfoResponse);
  // StreamLogs streams the capsuled daemon's own log output (slog).
  // This is the host-side log — boot, reconciler ticks, runtime driver
  // events. Separate from workload logs, which go via WorkloadService.Logs.
  rpc StreamLogs(CapsuleLogsRequest) returns (stream CapsuleLogChunk);

  // UpdateOS streams a new OS update bundle from the operator to the
  // capsule. The first message is metadata (size + sha256); subsequent
  // messages carry chunked bytes. Capsuled writes the new rootfs to the
  // inactive A/B slot, copies the kernel + initramfs into /boot, flips
  // GRUB's `set default=` to the new slot, persists pending state, and
  // schedules a reboot. The capsule comes back in TENTATIVE mode and
  // waits for UpdateConfirm — if that doesn't arrive before the deadline,
  // capsuled rolls `set default=` back and reboots into the prior slot.
  rpc UpdateOS(stream UpdateOSRequest) returns (UpdateOSResponse);

  // UpdateConfirm commits a tentative slot. Operator runs this after
  // they've verified the new slot is healthy. Persists the GRUB default
  // selection and clears pending state.
  rpc UpdateConfirm(UpdateConfirmRequest) returns (UpdateConfirmResponse);
}

message GetInfoRequest {}

message GetInfoResponse {
  // Hostname as reported by the kernel.
  string hostname = 1;
  // Kernel release string (uname -r).
  string kernel_release = 2;
  // Kernel version string (uname -v).
  string kernel_version = 3;
  // Machine architecture (uname -m).
  string architecture = 4;
  // Seconds since boot.
  uint64 uptime_seconds = 5;
  // Capsule version baked into the binary at build time.
  string capsule_version = 6;
  // Which A/B slot booted this capsule ("slot_a" / "slot_b"). Empty in dev
  // mode (capsuled run off PID 1) or for old single-slot images.
  string active_slot = 7;
  // While an update is mid-commit, the slot we're trying. Empty otherwise.
  // If active_slot == pending_slot, we're in tentative mode and waiting
  // for UpdateConfirm before pending_deadline_unix.
  string pending_slot = 8;
  // Unix timestamp (seconds) at which capsuled will auto-reboot to roll
  // back if no UpdateConfirm arrives. Zero when no update is pending.
  int64 pending_deadline_unix = 9;
  // VERSION string from the most recently committed (or pending) bundle.
  string last_version = 10;

  // Resource snapshot for `capsulectl capsule info`. All bytes; zero
  // means "couldn't read" (e.g. dev-mode capsuled, or missing /proc).

  // Total RAM (MemTotal from /proc/meminfo).
  uint64 memory_total_bytes = 11;
  // RAM currently available — sum of free + reclaimable caches
  // (MemAvailable from /proc/meminfo). What you'd actually be able to
  // allocate without hitting swap.
  uint64 memory_available_bytes = 12;
  // CPU logical core count.
  uint32 cpu_cores = 13;
  // CPU model name from /proc/cpuinfo (first hit).
  string cpu_model = 14;
  // Boot disk device path (e.g. "/dev/vda", "/dev/nvme0n1").
  string boot_disk = 15;
  // Boot disk total size in bytes (BLKGETSIZE64).
  uint64 disk_total_bytes = 16;
  // LVM thin-pool data capacity. The thin pool backs every user volume,
  // so this is the practical "how much volume space the capsule has".
  uint64 thinpool_total_bytes = 17;
  // LVM thin-pool data currently allocated. Capsule fills up when this
  // approaches thinpool_total_bytes.
  uint64 thinpool_used_bytes = 18;
  // Capsule's current wall-clock time as Unix seconds. Lets capsulectl
  // surface clock skew between operator and capsule — drift breaks A/B
  // deadline-passed messages, log correlation, etc.
  int64 local_time_unix = 19;
}

message CapsuleLogsRequest {
  // If true, keep the stream open and emit new log lines as they arrive.
  bool follow = 1;
  // Return only the last N lines from the existing log before streaming.
  // 0 = from the start of the file.
  int32 tail_lines = 2;
}

message CapsuleLogChunk {
  // Raw log bytes. Line framing is preserved but not guaranteed.
  bytes data = 1;
}

message UpdateOSRequest {
  oneof msg {
    UpdateOSMetadata metadata = 1; // first message only
    bytes chunk = 2;               // subsequent streaming bytes (1 MiB recommended)
  }
}

message UpdateOSMetadata {
  // Total bundle size in bytes.
  uint64 total_bytes = 1;
  // sha256 of the whole bundle, lowercase hex. Server verifies before apply.
  string sha256_hex = 2;
}

message UpdateOSResponse {
  // Slot the bundle was written to ("slot_a" / "slot_b").
  string next_slot = 1;
  // VERSION string from the bundle.
  string next_version = 2;
  // Always true on success today; reserved for future "stage but don't reboot" flows.
  bool reboot_scheduled = 3;
}

message UpdateConfirmRequest {}

message UpdateConfirmResponse {
  // Slot that was committed.
  string committed_slot = 1;
  // VERSION committed.
  string committed_version = 2;
}
