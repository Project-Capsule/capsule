syntax = "proto3";

package capsule.v1;

// InstallService is exposed *only* when capsuled is running in installer
// mode (USB-booted on a machine with a viable internal install target).
// On a runtime capsule the service is not registered; clients calling
// it receive Unimplemented.
//
// The service is unauthenticated. Pre-adoption, there is no operator
// key on the capsule to verify against — physical access to the USB +
// presence on the LAN is the trust boundary, the same posture as the
// claim window today. The operator validates the installer's TLS
// fingerprint against the HDMI banner before triggering a flash.
service InstallService {
  // Status returns installer-mode metadata for a capsule. Used by
  // `capsulectl install --addr` when mDNS isn't available — the CLI
  // confirms the target is actually an installer before sealing a
  // key. Runtime capsules don't register InstallService at all, so
  // calling Status against one fails with Unimplemented.
  rpc Status(InstallStatusRequest) returns (InstallStatusResponse);

  // Install flashes a target disk with a fresh Capsule image and
  // optionally seeds it with the operator's pubkey so the disk-booted
  // capsule comes up already adopted. Server-streams progress events;
  // the final event carries the disk-booted capsule's future identity
  // so the CLI can write a context entry that will resolve once the
  // operator removes the USB and reboots.
  rpc Install(InstallRequest) returns (stream InstallProgress);
}

message InstallStatusRequest {}

message InstallStatusResponse {
  // Stable short handle for the installer ("capsule-a3f2"). Different
  // from the eventual disk-booted capsule's short_id, which is
  // generated by Install.
  string short_id = 1;
  // Capsule ID of the installer itself. Distinct from the future disk
  // identity; only meaningful while the USB is booted.
  string capsule_id = 2;
  // Auto-selected candidate target. Always set when there's at least
  // one viable target.
  string target_disk = 3;
  // Byte size of the auto-selected target.
  uint64 target_size_bytes = 4;
  // Full candidate list, including the auto-selected one. Operators
  // pass --target to pick a non-default disk; the CLI cross-checks
  // their choice against this list.
  repeated string targets = 5;
  // Build identifier of the running capsuled binary. The disk-booted
  // capsule will report the same version (it's the same squashfs).
  string version = 6;
}

message InstallRequest {
  // Target /dev path. Must be in InstallStatusResponse.targets. If
  // empty, the installer auto-picks targets[0] (the default that
  // appears in `discover` and on the HDMI banner).
  string target_disk = 1;
  // Operator's raw 32-byte Ed25519 public key. Sealed into the new
  // disk's PERM partition so the disk-booted capsule comes up with
  // this key already enrolled. Ignored when seal=false.
  bytes operator_pubkey = 2;
  // Operator-friendly label for the sealed key ("nuc-1"). Stored in
  // authorized_keys.name on the disk-booted capsule.
  string operator_name = 3;
  // When true (the default), seed /perm/firstboot.json on the target
  // disk with the operator pubkey, a freshly-generated capsule_id, and
  // a freshly-generated TLS keypair so the disk boots already adopted.
  // When false, the installer writes a fresh image with no pre-seed —
  // the disk will open its own claim window on first boot.
  bool seal = 4;
  // Force re-install on a target that already has a Capsule MBR. v1
  // default behavior refuses without this flag (avoid blowing away
  // someone's data by accident). Reserved; not currently enforced.
  bool reinstall = 5;
}

message InstallProgress {
  // Phase identifier — one of: "verify", "partition", "format_boot",
  // "write_slot_a", "write_slot_b", "install_grub", "seal_firstboot",
  // "sync", "done". Phases run in this order; "done" is always the
  // final message, sent regardless of how the operator's CLI renders
  // progress.
  string phase = 1;
  // 0..100, monotonically increasing within a phase. The CLI renders
  // this as a progress bar; the percent resets to 0 when the phase
  // changes.
  uint32 percent = 2;
  // Human-readable message ("writing 64 MiB of 2048 MiB to slot_a").
  // Allowed to be empty between progress ticks within a phase.
  string message = 3;
  // Populated only on the terminal "done" event. Identifies the
  // capsule that will come up when the operator power-cycles into the
  // freshly-flashed disk.
  InstallResult result = 4;
}

message InstallResult {
  // Stable UUID generated by the installer for the disk-booted
  // capsule. Operator's context entry pins this so a successful
  // adopt-after-install always matches.
  string capsule_id = 1;
  // SHA-256 of the TLS leaf certificate the disk-booted capsule will
  // present. Pre-generated by the installer and seeded onto /perm so
  // the operator's context entry pins it correctly without needing a
  // second TOFU prompt after reboot.
  string tls_fingerprint_sha256 = 2;
  // base64url(sha256(operator_pubkey)) — the kid under which the
  // operator's key was sealed. Echoed so the CLI can confirm the key
  // shipped to the disk matches the one it generated locally.
  string kid = 3;
  // Stable handle for the disk-booted capsule ("capsule-a3f2"). Shown
  // in next-steps messaging so the operator knows what to look for in
  // `discover` output after pulling the USB.
  string short_id = 4;
}
